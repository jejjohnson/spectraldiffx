site_name: SpectralDiffX
site_description: Pseudospectral differentiation, filtering, and PDE solvers in JAX — fully differentiable and JIT-compatible.
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/spectraldiffx
repo_name: jejjohnson/spectraldiffx
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            members_order: source
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            group_by_category: true
            show_category_heading: true
  - mkdocs-jupyter:
      include_source: true
      execute: false

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Theory:
    - Overview: theory/index.md
    - Fourier Pseudospectral Methods: theory/fourier.md
    - Spectral Transforms: theory/spectral_transforms.md
    - Elliptic Solvers: theory/elliptic_solvers.md
    - Capacitance Method: theory/capacitance.md
    - Chebyshev Pseudospectral Methods: theory/chebyshev.md
    - Spherical Harmonic Methods: theory/spherical.md
  - Guides:
    - Spectral Transforms: transforms_guide.md
    - Elliptic Solvers: elliptic_solvers_guide.md
    - Capacitance Solver: capacitance_guide.md
  - Examples:
    - 1D Differentiation: notebooks/demo_1d.py
    - 2D Differentiation: notebooks/demo_2d.py
    - Eigenfunction Gallery: notebooks/eigenfunction_gallery.py
    - Solver Comparison: notebooks/solver_comparison.py
    - Mixed Boundary Conditions: notebooks/mixed_bc_solvers.py
    - PS vs FD2 Eigenvalues: notebooks/ps_vs_fd2_eigenvalues.py
    - Elliptic Solvers: notebooks/demo_elliptic_solvers.py
    - Capacitance: notebooks/demo_capacitance.py
    - QG Turbulence: notebooks/demo_qg.py
    - QG with Diffrax: notebooks/pseudospectral_part2.py
    - KdV Equation: notebooks/kdv.py
    - Navier-Stokes 2D: notebooks/navier_stokes_2d.py
    - QG Model: notebooks/qg_model.py
  - API Reference:
    - Fourier:
      - Transforms: api/fourier/transforms.md
      - Eigenvalues: api/fourier/eigenvalues.md
      - Grids: api/fourier/grids.md
      - Operators: api/fourier/operators.md
      - Filters: api/fourier/filters.md
      - Solvers: api/fourier/solvers.md
      - Capacitance: api/fourier/capacitance.md
    - Chebyshev:
      - Grids: api/chebyshev/grids.md
      - Operators: api/chebyshev/operators.md
      - Filters: api/chebyshev/filters.md
      - Solvers: api/chebyshev/solvers.md
    - Spherical Harmonics:
      - Grids: api/spherical/grids.md
      - Operators: api/spherical/operators.md
      - Filters: api/spherical/filters.md
      - Harmonics: api/spherical/harmonics.md
      - Solvers: api/spherical/solvers.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
